name: Deploy to Cloudflare Pages

# Build + deploy on every push to main (and on manual trigger). GitHub runs the
# build here, so dependencies are always installed — unlike Cloudflare Pages'
# git build, which was skipping `npm install` and failing to resolve the API's
# npm deps (hono / aws4fetch / pinyin-pro).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SPA (apps/web/dist)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Uploads apps/web/dist (static SPA) and bundles ./functions (the Hono
          # API) with node_modules present, so all deps resolve. Reads bindings /
          # pages_build_output_dir from wrangler.toml.
          command: pages deploy apps/web/dist --project-name=qota --branch=main
