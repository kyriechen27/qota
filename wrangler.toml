# Cloudflare Pages config.
#
# Deploy with an EMPTY build command — the built apps/web/dist (static SPA +
# _worker.js, the whole Hono API) is committed to the repo, like remote-file.
# Rebuild with `npm run pages:build` and commit before pushing.
#
# Bindings & secrets are set in the Pages dashboard (Settings), NOT here:
#   - R2 bucket binding:   variable name BUCKET → your bucket (e.g. ota-file)
#   - D1 database binding:  variable name DB    → qota-db
#   - Secret:               JWT_SECRET (required)
#   - Optional secret:      ADMIN_PASSWORD (first-admin password; default admin12345)
#
# Storage uses the native R2 binding (env.BUCKET) — no R2_ACCOUNT_ID / S3 keys /
# presigned URLs needed. The worker streams bytes to/from R2 via /api/storage/*.

name = "qota"
compatibility_date = "2024-11-18"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "apps/web/dist"

[vars]
ALLOWED_ORIGINS = "*"
JWT_TTL_SECONDS = "43200"
DOWNLOAD_URL_TTL_SECONDS = "300"
UPLOAD_PART_URL_TTL_SECONDS = "600"
# First-run admin email (auto-created when the users table is empty).
ADMIN_EMAIL = "admin@example.com"
